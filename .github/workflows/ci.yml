name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install SwiftLint if missing
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "SwiftLint not found, installing via Homebrew..."
            brew install swiftlint
          fi
          swiftlint version

      - name: Run SwiftLint
        run: swiftlint --strict

  spm-unit-tests:
    name: SPM Unit Tests
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run package tests with xcodebuild
        run: |
          xcodebuild test \
            -scheme SwiftStreamingMarkdown \
            -destination "platform=iOS Simulator,OS=26.4.1,name=iPhone 17" \
            -skipMacroValidation

  sample-app-build:
    name: Sample App Build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install XcodeGen if missing
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            echo "XcodeGen not found, installing via Homebrew..."
            brew install xcodegen
          fi
          xcodegen --version

      - name: Build sample app
        run: make build-sample
