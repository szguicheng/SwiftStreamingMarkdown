name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  spm-unit-tests:
    name: SPM Unit Tests
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run package tests with xcodebuild
        run: |
          xcodebuild test \
            -scheme SwiftStreamingMarkdown \
            -destination "platform=iOS Simulator,OS=26.4.1,name=iPhone 17" \
            -skipMacroValidation

  sample-app-build:
    name: Sample App Build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build sample app
        run: |
          xcodebuild build \
            -project Examples/SwiftStreamingMarkdownSample/SwiftStreamingMarkdownSample.xcodeproj \
            -scheme SwiftStreamingMarkdownSample \
            -configuration Debug \
            -destination "platform=iOS Simulator,OS=26.4.1,name=iPhone 17" \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
